name: Refresh Turso Data

on:
  schedule:
    - cron: "0 4 * * *" # 13:00 KST
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Refresh Turso data
        env:
          KEUMJ_SP500_DATABASE_URL: ${{ secrets.KEUMJ_SP500_DATABASE_URL }}
          KEUMJ_SP500_DATABASE_AUTH_TOKEN: ${{ secrets.KEUMJ_SP500_DATABASE_AUTH_TOKEN }}
          KEUMJ_MACRO_DATABASE_URL: ${{ secrets.KEUMJ_MACRO_DATABASE_URL }}
          KEUMJ_MACRO_DATABASE_AUTH_TOKEN: ${{ secrets.KEUMJ_MACRO_DATABASE_AUTH_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/refresh_turso_daily.py --mode direct --target all

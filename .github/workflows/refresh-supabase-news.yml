name: Refresh Supabase News

on:
  schedule:
    - cron: "7 15 * * *" # 00:07 KST
  workflow_dispatch:

concurrency:
  group: refresh-supabase-news
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Refresh Supabase news
        env:
          KEUMJ_SP500_SUPABASE_DATABASE_URL: ${{ secrets.KEUMJ_SP500_SUPABASE_DATABASE_URL }}
          KEUMJ_SP500_SUPABASE_HOST: ${{ secrets.KEUMJ_SP500_SUPABASE_HOST }}
          KEUMJ_SP500_SUPABASE_PORT: ${{ secrets.KEUMJ_SP500_SUPABASE_PORT }}
          KEUMJ_SP500_SUPABASE_DATABASE: ${{ secrets.KEUMJ_SP500_SUPABASE_DATABASE }}
          KEUMJ_SP500_SUPABASE_USER: ${{ secrets.KEUMJ_SP500_SUPABASE_USER }}
          KEUMJ_SP500_SUPABASE_PASSWORD: ${{ secrets.KEUMJ_SP500_SUPABASE_PASSWORD }}
          KEUMJ_SP500_SUPABASE_SSLMODE: ${{ secrets.KEUMJ_SP500_SUPABASE_SSLMODE }}
          KEUMJ_MACRO_SUPABASE_DATABASE_URL: ${{ secrets.KEUMJ_MACRO_SUPABASE_DATABASE_URL }}
          KEUMJ_MACRO_SUPABASE_HOST: ${{ secrets.KEUMJ_MACRO_SUPABASE_HOST }}
          KEUMJ_MACRO_SUPABASE_PORT: ${{ secrets.KEUMJ_MACRO_SUPABASE_PORT }}
          KEUMJ_MACRO_SUPABASE_DATABASE: ${{ secrets.KEUMJ_MACRO_SUPABASE_DATABASE }}
          KEUMJ_MACRO_SUPABASE_USER: ${{ secrets.KEUMJ_MACRO_SUPABASE_USER }}
          KEUMJ_MACRO_SUPABASE_PASSWORD: ${{ secrets.KEUMJ_MACRO_SUPABASE_PASSWORD }}
          KEUMJ_MACRO_SUPABASE_SSLMODE: ${{ secrets.KEUMJ_MACRO_SUPABASE_SSLMODE }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          KEUMJ_TURSO_EMBEDDED_REPLICA: "false"
        run: python scripts/refresh_supabase_daily.py --mode direct --target news
